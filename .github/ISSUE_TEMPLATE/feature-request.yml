name: Feature 请求
description: 提出新能力、交互优化或实现建议
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        建议优先说明“为什么需要这个能力”，再说明“希望怎么做”。

        当前仓库仍处于早期阶段，越贴近核心问题与最小可行范围的建议，越容易被采纳。
  - type: textarea
    id: problem
    attributes:
      label: 你要解决的问题
      description: 这个需求背后的真实痛点是什么？
      placeholder: 例如：项目很多时，希望更快定位最近用过的项目
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 你建议的方案
      description: 简述你希望增加或调整的行为
      placeholder: 例如：为 `fzf` 列表增加最近会话时间排序提示
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 你考虑过的替代方案
      description: 如果有，请写出其他可选方案和取舍
  - type: textarea
    id: scope
    attributes:
      label: 范围与边界
      description: 这个需求是否只面向 macOS / zsh？是否会影响当前设计边界？
  - type: textarea
    id: extra
    attributes:
      label: 补充信息
      description: 可附带草图、命令样例、相关 issue 或参考资料
